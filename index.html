<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 대전생활과학고 동아리 신청</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f0f2f5; color: #333; max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2 { text-align: center; color: #004792; margin-top: 0; }
        label { display: block; margin-bottom: 5px; font-size: 0.95rem; color: #555; }
        label strong { color: #004792; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; font-weight: bold; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        button { width: 100%; padding: 14px; background: #004792; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .status-box { background: #e7f0ff; padding: 15px; border-radius: 10px; border: 1px solid #b3d1ff; margin-bottom: 20px; text-align: center; line-height: 1.6; }
        .cancel-btn { background: #dc3545; width: auto; padding: 6px 15px; font-size: 0.9rem; margin-top: 10px; border-radius: 4px; color:white; border:none; cursor:pointer; font-weight:bold; }
        .club-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 15px 0; }
        .club-item:last-child { border-bottom: none; }
        .hidden { display: none; }
        .status-text { font-size: 0.9rem; color: #666; }
        .full { color: #dc3545; font-weight: bold; }
        #loading-overlay { display: none; text-align: center; color: #004792; font-weight: bold; padding: 10px; }
    </style>
</head>
<body>

    <div id="login-section" class="card">
        <h2>학생 인증</h2>
        <div>
            <label for="studentId"><strong>학번</strong>을 입력하세요.</label>
            <input type="number" id="studentId" placeholder="예: 3101" inputmode="numeric" oninput="vId(this)">
        </div>
        <div>
            <label for="studentName"><strong>이름</strong>을 입력하세요.</label>
            <input type="text" id="studentName" placeholder="예: 홍길동" oninput="vName(this)">
        </div>
        <button onclick="showClubs()">동아리 목록 보기</button>
    </div>

    <div id="club-section" class="card hidden">
        <h2>동아리 신청/확인</h2>
        <div id="my-status" class="status-box hidden"></div>
        <div id="loading-overlay">처리 중... 잠시만 기다리세요.</div>
        <div id="club-list">데이터 로딩 중...</div>
        <button onclick="location.reload()" style="background:#666; margin-top:20px;">로그아웃</button>
    </div>

    <script>
        // [1] 배포한 URL을 여기에 넣으세요.
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxlXreXZJFHZdzaf1oUTp0Sel3xSe5t28bFV2EgBA7ykjXJqQQzdBmjdkkqwPwuUVipdg/exec";

        // [2] 동아리와 정원은 여기서만 수정하면 됩니다!
        const clubs = [
            { name: "영상 제작부", limit: 15 },
            { name: "농구부", limit: 10 },
            { name: "코딩 동아리", limit: 10 },
            { name: "밴드부", limit: 8 },
            { name: "코딩부", limit: 8 }
        ];

        let studentInfo = { id: '', name: '' };

        function vId(el) { el.value = el.value.replace(/[^0-9]/g, '').slice(0, 4); }
        function vName(el) { el.value = el.value.replace(/[^ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/g, ''); }

        function showClubs() {
            studentInfo.id = document.getElementById('studentId').value.trim();
            studentInfo.name = document.getElementById('studentName').value.trim();
            if (studentInfo.id.length !== 4 || studentInfo.name.length < 2) {
                alert("학번(4자리)과 이름을 정확히 입력하세요."); return;
            }
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('club-section').classList.remove('hidden');
            renderClubs();
        }

        async function renderClubs() {
            const listDiv = document.getElementById('club-list');
            const statusBox = document.getElementById('my-status');
            try {
                const res = await fetch(WEB_APP_URL);
                const data = await res.json();
                const counts = data.counts || {};
                const records = data.records || {};
                const myClub = records[studentInfo.id];

                statusBox.classList.remove('hidden');
                if (myClub) {
                    statusBox.innerHTML = `<div>👋 <b>${studentInfo.name}</b>님 현재 신청:<br><b style="color:#004792; font-size:1.2rem;">[${myClub}]</b></div>
                        <button class="cancel-btn" onclick="cancelApply()">신청 취소하기</button>`;
                } else {
                    statusBox.innerHTML = `<div>👋 <b>${studentInfo.name}(${studentInfo.id})</b>님,<br>원하는 동아리를 선택해 주세요.</div>`;
                }

                listDiv.innerHTML = '';
                clubs.forEach(club => {
                    const count = counts[club.name] || 0;
                    const isFull = count >= club.limit;
                    const alreadyApplied = myClub !== undefined;
                    const item = document.createElement('div');
                    item.className = 'club-item';
                    item.innerHTML = `
                        <div>
                            <strong>${club.name}</strong><br>
                            <span class="status-text ${isFull ? 'full' : ''}">${count} / ${club.limit}명</span>
                        </div>
                        <button onclick="askPwAndSub('${club.name}', ${club.limit})" ${(isFull || alreadyApplied) ? 'disabled' : ''} style="width:80px; padding:8px;">
                            ${isFull ? '마감' : (alreadyApplied ? '신청완료' : '신청')}
                        </button>
                    `;
                    listDiv.appendChild(item);
                });
            } catch(e) { listDiv.innerHTML = '<p>데이터 로딩 실패</p>'; }
        }

        async function askPwAndSub(clubName, limit) {
            const pw = prompt(`[${clubName}] 신청 비밀번호 4자리를 설정하세요 (숫자만)`);
            if (!pw || !/^\d{4}$/.test(pw)) { alert("숫자 4자리를 입력해야 합니다."); return; }
            await sendData({ studentId: studentInfo.id, name: studentInfo.name, password: pw, clubName: clubName, clubLimit: limit });
        }

        async function cancelApply() {
            const pw = prompt("신청 시 설정한 비밀번호 4자리를 입력하세요.");
            if (!pw) return;
            await sendData({ action: "delete", studentId: studentInfo.id, password: pw });
        }

        async function sendData(payload) {
            document.getElementById('loading-overlay').style.display = 'block';
            try {
                const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();
                alert(result.message);
                renderClubs();
            } catch (e) { alert("통신 오류 발생"); }
            finally { document.getElementById('loading-overlay').style.display = 'none'; }
        }
    </script>
</body>
</html>
